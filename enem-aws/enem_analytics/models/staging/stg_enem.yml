version: 2

models:
  - name: stg_enem
    description: "Microdados do ENEM 2023 e 2024 limpos e padronizados"
    columns:
      - name: nu_inscricao
        description: "ID do participante"
        tests:
          - not_null

      - name: ano
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2023, 2024]
                quote: false

      - name: sexo
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Masculino', 'Feminino']

      - name: cor_raca
        tests:
          - not_null

      - name: uf
        tests:
          - not_null

      - name: nota_matematica
        tests:
          - not_null

      - name: nota_redacao
        tests:
          - not_null

      - name: escola_publica
        tests:
          - not_null